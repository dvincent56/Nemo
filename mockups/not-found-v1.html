<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nemo — Hors carte · 404 V1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
  rel="stylesheet"
/>
<style>
/* ─────────────────────────────────────────────────────────────
   NEMO — 404 "Hors carte"
   Direction éditoriale Nautical Luxury — ivory / navy / gold
   ───────────────────────────────────────────────────────────── */

:root {
  --ivory:        #f5f0e8;
  --ivory-2:      #ede8e0;
  --ivory-3:      #e4ddd0;
  --paper:        #fbf7f0;
  --navy:         #1a2840;
  --navy-2:       #243552;
  --navy-soft:    rgba(26, 40, 64, 0.06);
  --navy-line:    rgba(26, 40, 64, 0.12);
  --navy-rule:    rgba(26, 40, 64, 0.20);
  --gold:         #c9a227;
  --gold-dark:    #a8871e;
  --gold-soft:    rgba(201, 162, 39, 0.12);
  --t1: #1a2840;
  --t2: #4a5568;
  --t3: #8a7f6d;

  --font-display: "Bebas Neue", Impact, sans-serif;
  --font-body:    "Space Grotesk", system-ui, sans-serif;
  --font-mono:    "Space Mono", ui-monospace, monospace;

  --r-sm: 2px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  background: var(--ivory);
  color: var(--t1);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body * { max-width: 100%; }

/* Grain papier discret */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 30% 20%, rgba(201, 162, 39, 0.04), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(26, 40, 64, 0.03), transparent 60%);
  z-index: 0;
}

/* ──────── Layout ──────── */
.page {
  position: relative;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 24px;
  z-index: 1;
}

/* ──────── Logo (iso Topbar du site) ──────── */
.brand {
  position: fixed;
  top: 24px;
  left: clamp(20px, 4vw, 64px);
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 0.08em;
  color: var(--navy);
  text-decoration: none;
  z-index: 3;
  transition: color 150ms ease;
}
.brand span { color: var(--gold); }
.brand:hover { color: var(--navy-2); }
.brand:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: 4px;
  border-radius: 2px;
}

/* ──────── Coordonnées HUD bas-gauche ──────── */
.hud-pos {
  position: fixed;
  bottom: 20px;
  left: clamp(20px, 4vw, 48px);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--t3);
  text-transform: uppercase;
  z-index: 3;
}
.hud-pos b {
  color: var(--gold-dark);
  font-weight: 400;
}

/* ──────── Carte (calque arrière) ──────── */
.chart {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0;
  animation: chart-in 800ms ease-out 100ms forwards;
  z-index: 1;
}
.chart svg {
  width: 100%;
  height: 100%;
  display: block;
}

@keyframes chart-in {
  to { opacity: 0.42; }
}

/* Trait de route — anim de tracé */
.route {
  stroke-dasharray: 6 8;
  stroke-dashoffset: 1200;
  animation: route-draw 1400ms ease-out 700ms forwards;
}
@keyframes route-draw {
  to { stroke-dashoffset: 0; }
}

/* Point ICI — apparition après la route */
.here-pt {
  opacity: 0;
  transform-origin: center;
  animation: here-pop 500ms ease-out 1900ms forwards,
             here-pulse 2400ms ease-in-out 2400ms 2;
}
@keyframes here-pop {
  0% { opacity: 0; transform: scale(0.4); }
  60% { transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes here-pulse {
  0%, 100% { filter: drop-shadow(0 0 0 rgba(201, 162, 39, 0)); }
  50%      { filter: drop-shadow(0 0 8px rgba(201, 162, 39, 0.7)); }
}
.here-label {
  opacity: 0;
  animation: here-label-in 400ms ease-out 2100ms forwards;
}
@keyframes here-label-in {
  to { opacity: 1; }
}

/* Rose des vents — oscillation très lente */
.compass {
  transform-origin: 1080px 140px;
  animation: compass-sway 8s ease-in-out infinite;
}
@keyframes compass-sway {
  0%, 100% { transform: rotate(-2deg); }
  50%      { transform: rotate(2deg); }
}

/* ──────── Bloc texte centré ──────── */
.hero {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 640px;
  padding: 0 8px;
  opacity: 0;
  transform: translateY(8px);
  animation: hero-in 700ms ease-out 400ms forwards;
}
@keyframes hero-in {
  to { opacity: 1; transform: translateY(0); }
}

.kicker {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--gold-dark);
  text-transform: uppercase;
  margin-bottom: 24px;
}
.kicker::before,
.kicker::after {
  content: '·';
  margin: 0 10px;
  color: var(--navy-rule);
}

.title {
  font-family: var(--font-display);
  font-size: clamp(56px, 11vw, 120px);
  line-height: 0.92;
  letter-spacing: 0.005em;
  color: var(--navy);
  margin: 0;
  font-weight: 400;
}

.rule {
  width: 56px;
  height: 1px;
  background: var(--gold);
  margin: 28px auto 24px;
  border: 0;
}

.lede {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  color: var(--t2);
  font-style: italic;
  max-width: 38ch;
  margin: 0 auto 36px;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--navy);
  color: var(--ivory);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 16px 28px;
  border-radius: var(--r-sm);
  text-decoration: none;
  transition: background 200ms ease, transform 200ms ease;
}
.cta:hover {
  background: var(--navy-2);
  transform: translateX(-2px);
}
.cta .arrow {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--gold);
  font-weight: 700;
}

/* ──────── Responsive ──────── */
@media (max-width: 720px) {
  .brand { font-size: 22px; top: 18px; left: 20px; }
  .hud-pos { font-size: 9px; bottom: 16px; }
  .lede { font-size: 14.5px; }
  .cta { padding: 14px 22px; font-size: 12px; }
  /* simplification de la carte sur mobile : on masque les détails secondaires */
  .compass, .isobath-secondary, .coast-mark { display: none; }
  .chart { animation-delay: 50ms; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .chart, .hero, .route, .here-pt, .here-label, .compass {
    animation: none !important;
  }
  .chart { opacity: 0.42; }
  .hero  { opacity: 1; transform: none; }
  .route { stroke-dashoffset: 0; }
  .here-pt, .here-label { opacity: 1; }
}
</style>
</head>
<body>

<a href="/" class="brand" aria-label="Nemo — accueil">NE<span>M</span>O</a>

<main class="page">

  <!-- ── Calque carte arrière ────────────────────────────────── -->
  <div class="chart" aria-hidden="true">
    <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
          <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a2840" stroke-width="0.5" stroke-opacity="0.18"/>
        </pattern>
      </defs>

      <!-- Cadre éditorial double trait -->
      <rect x="60" y="60" width="1080" height="680" fill="none" stroke="#1a2840" stroke-width="1" stroke-opacity="0.5"/>
      <rect x="68" y="68" width="1064" height="664" fill="none" stroke="#1a2840" stroke-width="0.5" stroke-opacity="0.3"/>

      <!-- Grille parallèles/méridiens -->
      <rect x="68" y="68" width="1064" height="664" fill="url(#grid)"/>

      <!-- Repères de coordonnées sur le cadre (style carte ancienne) -->
      <g font-family="Space Mono, monospace" font-size="9" fill="#1a2840" fill-opacity="0.55" letter-spacing="0.1em">
        <text x="74" y="55">47°N</text>
        <text x="1100" y="55">04°W</text>
        <text x="74" y="752">45°N</text>
        <text x="1100" y="752">02°W</text>
      </g>

      <!-- Côte stylisée (triangles éditoriaux à gauche) -->
      <g class="coast-mark" stroke="#1a2840" stroke-opacity="0.35" stroke-width="0.8" fill="none">
        <path d="M 68 220 L 130 240 L 95 280 L 145 320 L 90 360 L 130 410 L 80 460 L 120 510"/>
      </g>

      <!-- Isobathes (lignes de profondeur en pointillés) -->
      <g fill="none" stroke="#1a2840" stroke-opacity="0.22" stroke-width="0.8" stroke-dasharray="2 4">
        <path d="M 200 200 Q 480 280 720 240 T 1100 320"/>
        <path class="isobath-secondary" d="M 220 350 Q 500 430 740 400 T 1120 480" stroke-opacity="0.18"/>
        <path class="isobath-secondary" d="M 180 540 Q 450 600 700 580 T 1110 640" stroke-opacity="0.15"/>
      </g>

      <!-- Rose des vents -->
      <g class="compass" stroke="#1a2840" stroke-opacity="0.4" fill="#1a2840" fill-opacity="0.4">
        <circle cx="1080" cy="140" r="46" fill="none" stroke-width="0.8"/>
        <circle cx="1080" cy="140" r="34" fill="none" stroke-width="0.5"/>
        <circle cx="1080" cy="140" r="2.5" stroke="none"/>
        <!-- Branches N/S/E/O -->
        <path d="M 1080 90 L 1085 138 L 1080 140 L 1075 138 Z" stroke="none"/>
        <path d="M 1080 190 L 1085 142 L 1080 140 L 1075 142 Z" fill-opacity="0.25" stroke="none"/>
        <path d="M 1130 140 L 1082 145 L 1080 140 L 1082 135 Z" fill-opacity="0.25" stroke="none"/>
        <path d="M 1030 140 L 1078 145 L 1080 140 L 1078 135 Z" fill-opacity="0.25" stroke="none"/>
        <!-- Diagonales fines -->
        <line x1="1045" y1="105" x2="1115" y2="175" stroke-width="0.4" stroke-opacity="0.3"/>
        <line x1="1115" y1="105" x2="1045" y2="175" stroke-width="0.4" stroke-opacity="0.3"/>
        <!-- Lettres cardinales -->
        <text x="1080" y="80" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill-opacity="0.65" stroke="none" letter-spacing="0.1em">N</text>
        <text x="1080" y="208" text-anchor="middle" font-family="Space Mono, monospace" font-size="9" fill-opacity="0.4" stroke="none">S</text>
        <text x="1148" y="144" text-anchor="middle" font-family="Space Mono, monospace" font-size="9" fill-opacity="0.4" stroke="none">E</text>
        <text x="1012" y="144" text-anchor="middle" font-family="Space Mono, monospace" font-size="9" fill-opacity="0.4" stroke="none">O</text>
      </g>

      <!-- TRAIT DE ROUTE — crayon or, sort de la carte -->
      <path class="route"
            d="M 280 640 Q 460 540 580 520 T 820 380 Q 920 320 1010 240 Q 1080 180 1170 50"
            fill="none"
            stroke="#c9a227"
            stroke-width="1.6"
            stroke-linecap="round"/>

      <!-- Petits points-relais sur la route -->
      <g fill="#c9a227" fill-opacity="0.6">
        <circle cx="280" cy="640" r="2.5"/>
        <circle cx="580" cy="520" r="2.5"/>
        <circle cx="820" cy="380" r="2.5"/>
      </g>

      <!-- POINT "ICI" — placé HORS du cadre (cadre s'arrête à y=68 / x=1132) -->
      <g class="here-pt">
        <circle cx="1170" cy="50" r="6" fill="#c9a227"/>
        <circle cx="1170" cy="50" r="11" fill="none" stroke="#c9a227" stroke-width="0.8" stroke-opacity="0.5"/>
      </g>
      <text class="here-label"
            x="1158" y="34"
            text-anchor="end"
            font-family="Space Mono, monospace"
            font-size="11"
            font-weight="700"
            letter-spacing="0.18em"
            fill="#a8871e">ICI</text>

    </svg>
  </div>

  <!-- ── Bloc texte central ──────────────────────────────────── -->
  <section class="hero">
    <div class="kicker">404 — Hors carte</div>
    <h1 class="title">Vous êtes perdu<br/>en mer ?</h1>
    <hr class="rule" />
    <p class="lede">
      Cette page n'apparaît sur aucune de nos cartes.<br/>
      Aucune côte connue à cette position.
    </p>
    <a href="/" class="cta">
      <span class="arrow">←</span>
      Retour au port
    </a>
  </section>

</main>

<div class="hud-pos">POS · <b>UNKNOWN</b></div>

</body>
</html>
